configuration:
  api_key:
    name: API key
    description: A random secret of at least 16 characters used by WAHA and the future Home Assistant integration.
  session_name:
    name: Session name
    description: Stable internal name for the single household WhatsApp session.
  device_name:
    name: Linked device name
    description: Name shown in WhatsApp under Linked devices.
  auto_create_session:
    name: Create session automatically
    description: Create and start the configured session when WAHA is first installed.
  log_level:
    name: Log level
    description: Use debug only temporarily because it produces significantly more output.
  download_media:
    name: Download incoming media
    description: Keep disabled for the notification-only phase to reduce storage and data exposure.
network:
  3000/tcp: WAHA API and native dashboard; expose only on a trusted LAN when required.
